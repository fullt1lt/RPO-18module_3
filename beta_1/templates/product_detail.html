{% extends 'base/base.html' %} {% load static %}
{% block content %}
<div>
  {% if product %}
  <h2>{{product.name}}</h2>
  <p>{{product.descriptions}}</p>
  <p>{{product.price}}</p>
  <img src="{{product.image.url}}" alt="" />
  {% else %}
  {% include 'includes/product_404.html' %}
  {% endif %}
</div>

{% endblock content %}
